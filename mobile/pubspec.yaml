name: safecircle
description: Consent-based real-time location sharing for families, friends, and teams.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.4

  # Navigation
  go_router: ^14.2.0

  # Maps
  google_maps_flutter: ^2.6.1

  # Location
  geolocator: ^12.0.0
  permission_handler: ^11.3.0

  # Background location
  background_fetch: ^1.2.3

  # Auth
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.3
  google_sign_in: ^6.2.1

  # Push notifications
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^17.2.2

  # Networking
  dio: ^5.5.0
  socket_io_client: ^2.0.3+1

  # Secure storage
  flutter_secure_storage: ^9.2.1

  # UI & icons
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0

  # Utilities
  intl: ^0.19.0
  timeago: ^3.6.1
  uuid: ^4.4.2
  crypto: ^3.0.3
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
